{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card bg-black text-light mt-5 border-secondary">

                <div class="card-body p-4">

                    <h2 class="mb-4 text-center">

                        Welcome Back

                    </h2>

                    <form method="post">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <a href="{% url 'register' %}"
                           class="text-info text-decoration-none">

                            Create New Account

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>

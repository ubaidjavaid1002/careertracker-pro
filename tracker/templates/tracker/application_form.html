{% extends 'tracker/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card p-4">

            <h2 class="mb-4">

                Add New Application

            </h2>

            <form method="post">
                
                {% csrf_token %}

                {% if form.non_field_errors %}

                    <div class="alert alert-danger">

                        {{ form.non_field_errors }}

                    </div>

                {% endif %}

                {% for field in form %}

                <div class="mb-3">

                    <label class="form-label">

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {% if field.errors %}

                    <small class="text-danger">

                        {{ field.errors }}

                    </small>

                    {% endif %}

                </div>

                {% endfor %}

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Application

                </button>

            </form>

        </div>

    </div>

</div>

<script>

document.addEventListener(
    "DOMContentLoaded",
    function () {

        const statusField =
            document.getElementById("id_status");

        const interviewDate =
            document.getElementById("id_interview_date")
                .closest(".mb-3");

        const interviewTime =
            document.getElementById("id_interview_time")
                .closest(".mb-3");

        function toggleFields() {

            if (
                statusField.value === "Interview"
            ) {

                interviewDate.style.display = "";

                interviewTime.style.display = "";

            }

            else {

                interviewDate.style.display = "none";

                interviewTime.style.display = "none";

            }
        }

        toggleFields();

        statusField.addEventListener(
            "change",
            toggleFields
        );

    });

</script>

{% endblock %}

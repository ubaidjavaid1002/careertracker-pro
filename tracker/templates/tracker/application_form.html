{% extends 'tracker/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card p-4">

            <h2 class="mb-4">

                Add New Application

            </h2>

            <form method="post">

                {% csrf_token %}

                {% for field in form %}

                <div class="mb-3">

                    <label class="form-label">

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {% if field.errors %}

                    <small class="text-danger">

                        {{ field.errors }}

                    </small>

                    {% endif %}

                </div>

                {% endfor %}

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Application

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}

<!DOCTYPE html>
<html>
<head>

<title>CareerTracker Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#111827;
    color:#f9fafb;
}

.navbar{
    background:#0f172a;
}

.card{
    background:#1f2937;
    border:none;
    border-radius:16px;
}

.form-control,
.form-select{

    background:#374151;
    border:1px solid #4b5563;
    color:white;

    appearance:auto;
    -webkit-appearance:auto;
    -moz-appearance:auto;
}

.form-control:focus,
.form-select:focus{

    background:#374151;
    color:white;
    border-color:#6366f1;

    box-shadow:none;
}

.table{
    margin-bottom:0;
}

.btn-primary{

    background:#6366f1;
    border:none;
}

.btn-primary:hover{

    background:#4f46e5;
}

a{
    text-decoration:none;
}
.form-label{
    color:#f9fafb;
}

label{
    color:#f9fafb;
}

.card h2,
.card h3,
.card h4,
.card h5,
.card h6,
.card p,
.card span{
    color:#f9fafb;
}
.card{
    color:#f9fafb;
}
th{
    color:#f9fafb !important;
}
.form-control::placeholder{
    color:#d1d5db;
}
.form-select{

    color:white;
}
option{
    color:white;
}

.pagination .page-link {

    background-color: #1e1e1e;
    color: #ffffff;
    border-color: #444;

}

.pagination .page-link:hover {

    background-color: #2d2d2d;
    color: #ffffff;

}

.pagination .page-item.active .page-link {

    background-color: #343a40;
    border-color: #f0f0f0;
    color: #ffffff;

}
</style>

</head>

<body class="bg-dark text-light">

{% include 'tracker/navbar.html' %}

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>
<!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
</body>
</html>
